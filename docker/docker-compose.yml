version: '3.8'

services:
  rag-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../.env:/app/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - rag-network

  rag-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.streamlit
    ports:
      - "8501:8501"
    volumes:
      - ../app/frontend:/app/frontend
    depends_on:
      - rag-api
    restart: unless-stopped
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge